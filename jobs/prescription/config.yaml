name: "prescription"                 # Технический ID (как имя папки)
title: "Рецепты все таблицы"          # Красивое имя для UI и истории
category: "Медицинские учреждения"          # Категория для группировки в боте
database_profile: "database.postgres_llo"  # Профиль БД из main.toml

enabled: true
require_parameters: true
#schedule: "interval:1" # <--- Запуск каждую минуту для теста
# 1. Периодические запуски (interval)
#schedule: "interval:1"         # Каждую 1 минуту (ваш тестовый вариант)
#schedule: "interval:15"        # Каждые 15 минут
#schedule: "interval:120"       # Каждые 2 часа (120 минут)

# 2. Запуск каждый день в точное время (cron по часам и минутам)
#schedule: "cron:14:30"         # Каждый день ровно в 14:30
#schedule: "cron:09:00"         # Каждый день ровно в 09:00 утра
#schedule: "cron:00:00"         # Каждую полночь

# 3. Запуск по дням недели в точное время (cron:день_недели:час:минута)
#schedule: "cron:mon-fri:09:00" # С понедельника по пятницу в 09:00 утра
#schedule: "cron:sat,sun:12:00" # В субботу и воскресенье в полдень
#schedule: "cron:mon:01:00"     # Только каждый понедельник в 01:00 ночи

# Настройки проверки данных
validation:
  allow_empty: false         # Пустые данные запрещены
  on_empty_action: "allow"          #"alert"   # Если пусто — паниковать (прервать выполнение)

# Структура Excel-файла
workbook:
  filename_template: "рецепты_все_таблицы_{YYYY}_{MM}_{DD}.xlsx"
  sheets:
    - name: "prescription"   # Имя первой вкладки
      sql_file: "prescription.sql"
      columns:                # Расширенные имена колонок
        id: "ID"
        #manager_name: "ФИО Сотрудника"
    - name: "prescription_row"   # Имя первой вкладки
      sql_file: "prescription_row.sql"
      columns:                # Расширенные имена колонок
        id: "ID"
        #manager_name: "ФИО Сотрудника"
    - name: "prescription_events"   # Имя первой вкладки
      sql_file: "prescription_events.sql"
      columns:                # Расширенные имена колонок
        id: "ID"
        #manager_name: "ФИО Сотрудника"
    - name: "prescription_sale"   # Имя первой вкладки
      sql_file: "prescription_sale.sql"
      columns:                # Расширенные имена колонок
        id: "ID"
        #manager_name: "ФИО Сотрудника"
    - name: "prescription_servicing"   # Имя первой вкладки
      sql_file: "prescription_servicing.sql"
      columns:                # Расширенные имена колонок
        id: "ID"
        #manager_name: "ФИО Сотрудника"
    - name: "e_recipe_log"   # Имя первой вкладки
      sql_file: "e_recipe_log.sql"
      columns:                # Расширенные имена колонок
        id: "ID"
        #manager_name: "ФИО Сотрудника"
        #amount: "Выручка, ₽"
        #report_generated_at: "Дата расчета"

#Дистрибуция отчета
delivery:
  local:
    enabled: true
    target_path: "D:\\Archive\\Reports" # Замените на любой реальный локальный путь для теста
  mail:
    enabled: false # Включите (true) и настройте доступы в config/main.toml, если хотите проверить отправку писем
    to:
      - "your_test_email@company.com"
    subject: "📊 Свежая аналитика по менеджерам"
    body: "Приветствую! Отчет сформирован автоматически. Файл во вложении."      
  nextcloud:
    enabled: false # Включите при наличии тестового стенда
    remote_path: "Reports/Sales"
  yandex_messenger:
    enabled: false # Включите при наличии рабочего токена бота
    chat_id: "0/0/..." 
    caption: "📊 Ловите свежие данные по эффективности!"    
    
# ДЕКЛАРАЦИЯ ПАРАМЕТРОВ
parameters:
  numbers:
    type: "string"
    default: "00Д4532001501, 00Д4532001502" # Дефолтное значение через запятую без пробелов
    label: "Список номеров рецептов (через запятую, без пробелов)"
    
